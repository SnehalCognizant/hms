server.port=8070
spring.application.name=api-gateway1
 
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
 
#eureka.instance.prefer-ip-address=true
eureka.instance.preferIpAddress=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- Gateway routes ---
spring.cloud.gateway.routes[0].id=identity-service
spring.cloud.gateway.routes[0].uri=lb://identity-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[1].id=inventory-service
spring.cloud.gateway.routes[1].uri=lb://inventory-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/inventory-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=reservation-service
spring.cloud.gateway.routes[2].uri=lb://reservation-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/reservations/**

spring.cloud.gateway.routes[3].id=stay-service
spring.cloud.gateway.routes[3].uri=lb://stay-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/stays/**

spring.cloud.gateway.routes[4].id=guest-service
spring.cloud.gateway.routes[4].uri=lb://guest-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/requests/**

spring.cloud.gateway.routes[5].id=billing-service
spring.cloud.gateway.routes[5].uri=lb://billing-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/bills/**

# --- JWT Configuration ---
jwt.secret=mySecretKeyForHotelManagementSystemThatIsLongEnoughToBeSecureAndCanBeUsedForHS512
jwt.expiration=86400000


